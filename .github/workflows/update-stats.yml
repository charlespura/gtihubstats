name: Update GitHub stats (JSON + SVG)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate stats.json + stats.svg
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_USER: ${{ vars.GITHUB_USER || github.repository_owner }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          export PAGES_BASE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}"
          node scripts/update-stats.mjs

      - name: Commit changes (if any)
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json stats.svg
          git commit -m "chore: update GitHub stats"
          git push
